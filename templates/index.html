{% extends "base.html" %}
{% block title %}Dashboard - Temp Monitor{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
{% endblock %}
{% block content %}
<h1 class="section-title" style="font-size: var(--text-xl); margin-bottom: var(--space-5);">Live CPU Monitor</h1>
<div class="machine-grid" id="machine-cards"></div>
<div class="empty-state" id="empty-state" style="display:none;">No machines have reported in yet.</div>
{% endblock %}
{% block page_scripts %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}

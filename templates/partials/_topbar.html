<header class="topbar">
    {% if request.endpoint in ('index', 'machine_page') %}
    <span id="socket-status" class="status-pill status-pill--muted"><span class="status-pill__dot"></span>Connecting&hellip;</span>
    {% endif %}
    <span class="badge">Hub v{{ hub_version }}</span>
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme" aria-pressed="false">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>
    </button>
    {% if session.user %}
    <span class="topbar__email">{{ session.user.email }}</span>
    <a class="btn btn--ghost" href="{{ url_for('logout') }}">Sign out</a>
    {% endif %}
</header>
